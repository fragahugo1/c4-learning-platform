<div style="display: flex;">
  <app-sidebar 
    [currentLayer]="currentLayer()"
    (onValidate)="executarValidacao()">
  </app-sidebar>
  <app-board
    style="flex-grow: 1;"
    [activeTool]="activeTool"
    [currentLayer]="currentLayer()">
  </app-board>
</div>

<app-horizontal-bar
  (toolChanged)="activeTool = $event"
  (layerChanged)="onLayerChanged($event)">
</app-horizontal-bar>
